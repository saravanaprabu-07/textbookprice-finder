<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <h2>📚 Student Book Finder</h2>
    <a href="/logout">Logout</a>
</div>

<!-- SEARCH -->
<div class="search-box">
    <form method="GET" action="/home">
        <input name="search" placeholder="🔍 Search by title, subject, price">
        <button>Search</button>
    </form>
</div>

<!-- ADD BOOK -->
<div class="form-box">
    <h3>Add New Book</h3>
    <form method="POST" action="/add_book">
        <input name="title" placeholder="Book Title" required>
        <input name="author" placeholder="Author Name" required>
        <input name="subject" placeholder="Subject" required>
        <input name="price" placeholder="Price" required>
        <input name="holder" placeholder="Available With" required>
        <button>Add Book</button>
    </form>
</div>

<!-- BOOK LIST -->
<h2 class="section-title">📖 Available Books</h2>

<div class="books-container">
    {% for book in books %}
    <div class="book-card">
        <h3>{{ book.title }}</h3>
        <p><b>Author:</b> {{ book.author }}</p>
        <p><b>Subject:</b> {{ book.subject }}</p>
        <p class="price">₹{{ book.price }}</p>
        <p><b>Holder:</b> {{ book.holder }}</p>

        <!-- DELETE BUTTON (ADMIN ONLY) -->
        {% if session.role == "admin" %}
        <a href="/delete_book/{{ book.id }}" 
           class="delete-btn"
           onclick="confirmDelete(event)">
           🗑 Delete
        </a>
        {% endif %}
    </div>
    {% endfor %}
</div>

<!-- ADMIN LINK -->
<div class="admin-link">
    <a href="/view_logins">👤 View Logged Users</a>
</div>

<!-- SCRIPT -->
<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
